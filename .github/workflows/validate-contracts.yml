name: validate-contracts

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate-json-schemas.py
      - run: python scripts/validate-yaml-structure.py
      - run: python scripts/validate-agent-docs.py
